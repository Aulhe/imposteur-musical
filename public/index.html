<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMPOSTEUR MUSICAL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ECRAN ACCUEIL -->
  <div id="screen-home" class="screen active">
    <div class="container">
      <h1 class="title glitch" data-text="IMPOSTEUR">IMPOSTEUR</h1>
      <p class="subtitle">🎵 Trouve l'imposteur musical 🎵</p>
      <div class="home-buttons">
        <button id="btn-create" class="btn btn-primary">Créer un lobby</button>
        <button id="btn-join" class="btn btn-secondary">Rejoindre</button>
      </div>
    </div>
  </div>

  <!-- ECRAN CREATION -->
  <div id="screen-create" class="screen">
    <div class="container">
      <h2>Créer une partie</h2>
      <div class="form-group">
        <label for="create-name">Ton pseudo</label>
        <input type="text" id="create-name" maxlength="15" placeholder="Entre ton pseudo..." autocomplete="off">
      </div>
      <button id="btn-do-create" class="btn btn-primary">Créer le lobby</button>
      <button class="btn btn-back" data-back="home">← Retour</button>
      <p id="create-error" class="error"></p>
    </div>
  </div>

  <!-- ECRAN REJOINDRE -->
  <div id="screen-join" class="screen">
    <div class="container">
      <h2>Rejoindre une partie</h2>
      <div class="form-group">
        <label for="join-name">Ton pseudo</label>
        <input type="text" id="join-name" maxlength="15" placeholder="Entre ton pseudo..." autocomplete="off">
      </div>
      <div class="form-group">
        <label for="join-code">Code du lobby</label>
        <input type="text" id="join-code" maxlength="5" placeholder="XXXXX" autocomplete="off" class="code-input">
      </div>
      <button id="btn-do-join" class="btn btn-primary">Rejoindre</button>
      <button class="btn btn-back" data-back="home">← Retour</button>
      <p id="join-error" class="error"></p>
    </div>
  </div>

  <!-- ECRAN LOBBY -->
  <div id="screen-lobby" class="screen">
    <div class="container">
      <h2>Lobby</h2>
      <div class="lobby-code-box">
        <span>Code :</span>
        <span id="lobby-code" class="lobby-code"></span>
        <button id="btn-copy-code" class="btn btn-small" title="Copier">📋</button>
      </div>
      <div id="lobby-players" class="player-list"></div>
      <div id="lobby-host-controls" class="host-controls" style="display:none;">
        <div class="form-group">
          <label for="rounds-select">Nombre de manches</label>
          <select id="rounds-select">
            <option value="1">1 manche</option>
            <option value="2">2 manches</option>
            <option value="3" selected>3 manches</option>
            <option value="5">5 manches</option>
          </select>
        </div>
        <button id="btn-start-game" class="btn btn-primary btn-large">Lancer la partie</button>
        <p id="start-error" class="error"></p>
      </div>
      <p id="lobby-waiting" class="info-text">En attente du lancement par l'hôte...</p>
    </div>
  </div>

  <!-- ECRAN JEU (tour de jeu) -->
  <div id="screen-game" class="screen">
    <div class="container">
      <div class="game-header">
        <span id="game-round" class="round-badge"></span>
        <span id="game-turn" class="turn-info"></span>
      </div>

      <div id="theme-reveal" class="theme-box">
        <p class="theme-label">Ton thème :</p>
        <p id="my-theme" class="theme-value"></p>
        <p id="impostor-badge" class="impostor-badge" style="display:none;">⚠️ Tu es l'IMPOSTEUR ⚠️</p>
      </div>

      <div id="submit-section" class="submit-section" style="display:none;">
        <p class="your-turn-label">C'est ton tour !</p>
        <div class="form-group">
          <label for="music-link">Colle un lien YouTube</label>
          <input type="text" id="music-link" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
        </div>
        <button id="btn-submit-link" class="btn btn-primary">Envoyer</button>
      </div>

      <div id="waiting-turn" class="waiting-section">
        <p>C'est au tour de <strong id="current-player-name"></strong></p>
        <div class="loader"></div>
      </div>

      <div id="submissions-list" class="submissions-list"></div>
    </div>
  </div>

  <!-- ECRAN VOTE -->
  <div id="screen-vote" class="screen">
    <div class="container">
      <h2>🗳️ Qui est l'imposteur ?</h2>
      <p class="vote-subtitle">Écoute les morceaux, discutez, puis votez !</p>
      <div id="all-submissions" class="submissions-recap"></div>
      <div id="vote-buttons" class="vote-buttons"></div>
      <p id="vote-status" class="info-text"></p>
      <p id="vote-error" class="error"></p>
    </div>
  </div>

  <!-- ECRAN RESULTATS -->
  <div id="screen-results" class="screen">
    <div class="container">
      <div id="result-reveal" class="result-reveal"></div>
      <div id="result-themes" class="result-themes"></div>
      <div id="result-votes" class="result-votes"></div>
      <div id="result-scores" class="scores-table"></div>
      <button id="btn-next-round" class="btn btn-primary" style="display:none;">Manche suivante →</button>
    </div>
  </div>

  <!-- ECRAN FIN DE PARTIE -->
  <div id="screen-finished" class="screen">
    <div class="container">
      <h2 class="glitch" data-text="FIN DE PARTIE">FIN DE PARTIE</h2>
      <div id="final-scores" class="scores-table"></div>
      <div id="winner-announce" class="winner-announce"></div>
      <button id="btn-restart" class="btn btn-primary" style="display:none;">Nouvelle partie</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
